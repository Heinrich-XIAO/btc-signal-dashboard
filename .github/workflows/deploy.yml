name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build frontend
        run: |
          cd dashboard
          npm install
          npm run build

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}
          log-public-key: false

      - name: Add VPS to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H 134.209.204.63 >> ~/.ssh/known_hosts

      - name: Deploy to VPS
        run: |
          ssh root@134.209.204.63 "cd /opt/btc-signal-dashboard && git reset --hard && git clean -fd && git pull && systemctl restart btc-dashboard"
          rsync -avz --delete -e "ssh -o StrictHostKeyChecking=no" dashboard/dist/ root@134.209.204.63:/opt/btc-signal-dashboard/dashboard/dist/
          ssh root@134.209.204.63 "systemctl restart btc-dashboard"
